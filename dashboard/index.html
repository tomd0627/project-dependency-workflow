<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dep Bot — Dependency Update Dashboard</title>
    <meta name="description" content="Dep Bot monitors your repositories for outdated dependencies, scores update risk, and surfaces security advisories in one dashboard." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/dashboard.css" />
  </head>
  <body>
    <div id="app">
      <div class="mobile-header">
        <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Open navigation" aria-expanded="false" aria-controls="sidebar">
          <svg class="menu-toggle__open-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          <svg class="menu-toggle__close-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <span class="mobile-header__title">Dep Bot</span>
      </div>
      <nav class="sidebar" id="sidebar" aria-label="Primary navigation">
        <div id="sidebar-root"></div>
      </nav>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>
      <main class="main-content" id="main">
        <div id="app-root"></div>
      </main>
    </div>
    <div aria-live="polite" aria-atomic="true" class="sr-only" id="status-announcer"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
