name: Approval Watcher

# Polls every 30 minutes for dep-bot issues that have been approved.
# When an approved issue is found with no open PR, runs the full pipeline
# for that repo to create the PR — completing the approve-to-PR flow
# without requiring a manual re-trigger of the main bot.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check-pause:
    runs-on: ubuntu-latest
    outputs:
      paused: ${{ steps.check.outputs.paused }}
    steps:
      - name: Check PAUSE_UNTIL
        id: check
        if: github.event_name == 'schedule'
        env:
          PAUSE_UNTIL: ${{ vars.PAUSE_UNTIL }}
        run: |
          if [[ -z "$PAUSE_UNTIL" ]]; then
            echo "paused=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$PAUSE_UNTIL" == "indefinite" ]]; then
            echo "Workflow paused indefinitely (PAUSE_UNTIL=indefinite). Clear the variable to resume."
            echo "paused=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          if [[ "$today" < "$PAUSE_UNTIL" ]]; then
            echo "Workflow paused until $PAUSE_UNTIL (today: $today)."
            echo "paused=true" >> "$GITHUB_OUTPUT"
          else
            echo "PAUSE_UNTIL=$PAUSE_UNTIL has passed (today: $today) — resuming normally."
            echo "paused=false" >> "$GITHUB_OUTPUT"
          fi

  watch-approvals:
    needs: check-pause
    if: needs.check-pause.outputs.paused != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for approved issues and create PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NOTIFY_USERNAME: ${{ vars.NOTIFY_USERNAME }}
        run: node src/approve-watcher.js

      - name: Commit run report for dashboard
        id: commit_report
        run: |
          REPO_COUNT=$(jq '.repositories | length' .cache/run-report.json 2>/dev/null || echo 0)
          if [ -f ".cache/run-report.json" ] && [ "$REPO_COUNT" -gt 0 ]; then
            mkdir -p dashboard/public
            cp .cache/run-report.json dashboard/public/run-report.json
            git config user.name "Dep Bot"
            git config user.email "dep-bot@users.noreply.github.com"
            git add dashboard/public/run-report.json
            if git diff --staged --quiet; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              git commit -m "chore: update dashboard run report [skip ci]"
              git push
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Trigger Netlify dashboard rebuild
        if: steps.commit_report.outputs.changed == 'true'
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -n "$NETLIFY_BUILD_HOOK" ]; then
            curl -s -X POST "$NETLIFY_BUILD_HOOK"
          fi
