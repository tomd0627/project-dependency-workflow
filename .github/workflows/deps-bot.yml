name: Dependency Bot

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Specific repo to scan (leave blank for all repos)"
        required: false
        default: ""
      dry_run:
        description: "Dry run mode (no changes applied)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-deps-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run dependency bot
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TARGET_REPO: ${{ inputs.target_repo }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node src/index.js

      - name: Commit run report for dashboard
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          if [ -f ".cache/run-report.json" ]; then
            mkdir -p dashboard/public
            cp .cache/run-report.json dashboard/public/run-report.json
            git config user.name "Dep Bot"
            git config user.email "dep-bot@users.noreply.github.com"
            git add dashboard/public/run-report.json
            git diff --staged --quiet || git commit -m "chore: update dashboard run report [skip ci]"
            git push
          fi

      - name: Trigger Netlify dashboard rebuild
        if: ${{ inputs.dry_run != 'true' }}
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -n "$NETLIFY_BUILD_HOOK" ]; then
            curl -s -X POST "$NETLIFY_BUILD_HOOK"
          fi
