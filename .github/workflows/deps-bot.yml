name: Dependency Bot

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Specific repo to scan (leave blank for all repos)"
        required: false
        default: ""
      dry_run:
        description: "Dry run mode (no changes applied)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-deps-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run dependency bot
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TARGET_REPO: ${{ inputs.target_repo }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node src/index.js
