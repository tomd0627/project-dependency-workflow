name: Bulk Merge

# Merges all open dep-bot PRs that are conflict-free.
# Neutral / informational checks (e.g. Netlify "Pages changed") do not block
# merge — only actual conflicts or branch-protection failures do.
#
# Runs the same pipeline check the watcher uses: skips any PR whose branch
# has conflicts so nothing broken lands on main.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bulk-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Merge all conflict-free dep-bot PRs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Searching for open dep-bot PRs..."

          prs=$(gh search prs \
            --label=automated \
            --label=dependencies \
            --state=open \
            --owner=@me \
            --limit=100 \
            --json repository,number,title)

          total=$(echo "$prs" | jq 'length')
          echo "Found $total candidate PR(s)"

          merged=0
          skipped=0

          while IFS= read -r row; do
            repo=$(echo "$row" | jq -r '.repository.nameWithOwner')
            number=$(echo "$row" | jq -r '.number')
            title=$(echo "$row" | jq -r '.title')

            # Only process dep-bot PRs.
            if [[ "$title" != "deps:"* ]]; then
              continue
            fi

            # Check mergeability — CLEAN means no conflicts and required checks
            # pass. UNSTABLE means optional/neutral checks haven't resolved yet
            # (e.g. Netlify "Pages changed"), which is fine to merge.
            state=$(gh pr view "$number" --repo "$repo" \
              --json mergeStateStatus --jq '.mergeStateStatus')

            if [[ "$state" == "CLEAN" || "$state" == "UNSTABLE" ]]; then
              gh pr merge "$number" --repo "$repo" --squash --delete-branch \
                --subject "$title"
              echo "  MERGED   $repo#$number ($state)"
              merged=$((merged + 1))
            else
              echo "  SKIPPED  $repo#$number — state: $state"
              skipped=$((skipped + 1))
            fi

          done < <(echo "$prs" | jq -c '.[]')

          echo ""
          echo "Done — merged: $merged | skipped: $skipped"
