name: Bulk Merge

# Merges all open dep-bot PRs whose CI checks have passed.
# Neutral / informational checks (e.g. Netlify "Pages changed") do not block
# merge — only actual conflicts or branch-protection failures do.
#
# IMPORTANT — run this only after PRs exist and CI has passed:
#   1. Run Bulk Approve  →  issues approved, Approval Watcher fires automatically
#   2. Wait ~2-3 minutes for the watcher to finish creating PRs
#   3. Wait for CI checks to pass on each PR (varies per repo; check the PRs)
#   4. Run this workflow  →  all green PRs are squash-merged
#
# PRs that are still running CI (BLOCKED) or have conflicts (DIRTY) are skipped
# and reported in the summary — re-run this workflow once they resolve.
#
# Uses gh pr list (direct REST API) rather than gh search prs to avoid GitHub
# search index lag, which can delay newly created PRs from appearing in results.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bulk-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Merge all conflict-free dep-bot PRs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Authenticated as: $(gh api user --jq '.login')"
          echo "Fetching repos..."

          merged=0
          skipped=0

          while IFS= read -r repo; do
            # List open PRs in this repo that carry both dep-bot labels.
            prs=$(gh pr list --repo "$repo" \
              --label "automated" \
              --label "dependencies" \
              --state open \
              --json number,title \
              2>/dev/null || true)

            [[ -z "$prs" || "$prs" == "[]" ]] && continue

            while IFS= read -r row; do
              [[ -z "$row" ]] && continue

              number=$(echo "$row" | jq -r '.number')
              title=$(echo "$row" | jq -r '.title')

              # Only process dep-bot PRs.
              if [[ "$title" != "deps:"* ]]; then
                continue
              fi

              # Check mergeability — CLEAN means no conflicts and required checks
              # pass. UNSTABLE means optional/neutral checks haven't resolved yet
              # (e.g. Netlify "Pages changed"), which is fine to merge.
              # BLOCKED = CI still running; DIRTY = merge conflict. Both are skipped.
              state=$(gh pr view "$number" --repo "$repo" \
                --json mergeStateStatus --jq '.mergeStateStatus')

              if [[ "$state" == "CLEAN" || "$state" == "UNSTABLE" ]]; then
                gh pr merge "$number" --repo "$repo" --squash --delete-branch \
                  --subject "$title"
                echo "  MERGED   $repo#$number ($state)"
                merged=$((merged + 1))
              else
                echo "  SKIPPED  $repo#$number — state: $state"
                skipped=$((skipped + 1))
              fi

            done < <(echo "$prs" | jq -c '.[]')

          done < <(gh repo list --limit 100 --json nameWithOwner --jq '.[].nameWithOwner')

          echo ""
          echo "Done — merged: $merged | skipped: $skipped"
          if [[ $skipped -gt 0 ]]; then
            echo "Re-run this workflow once skipped PRs finish CI or resolve conflicts."
          fi
