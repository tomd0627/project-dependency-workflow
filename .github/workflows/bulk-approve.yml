name: Bulk Approve

# Comments APPROVE on all open dep-bot issues that do not already have a SKIP
# comment, then immediately triggers the Approval Watcher so PRs are created
# without waiting for its next 30-minute scheduled run.
#
# Full manual flow:
#   1. Run this workflow  →  issues get approved, watcher fires automatically
#   2. Wait ~2-3 minutes for the watcher to finish creating PRs
#   3. Wait for CI checks to pass on each PR (varies per repo)
#   4. Run Bulk Merge  →  all green PRs are squash-merged
#
# To exclude a repo before triggering this workflow, comment SKIP on its issue.

on:
  workflow_dispatch:

permissions:
  actions: write
  issues: write

jobs:
  bulk-approve:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Approve all non-skipped dep-bot issues
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Searching for open dep-bot issues..."

          # Fetch up to 100 open issues with both dep-bot labels across all
          # repos owned by the authenticated user.
          issues=$(gh search issues \
            --label=automated \
            --label=dependencies \
            --state=open \
            --owner=@me \
            --limit=100 \
            --json repository,number,title)

          total=$(echo "$issues" | jq 'length')
          echo "Found $total candidate issue(s)"

          approved=0
          skipped=0
          already_approved=0

          while IFS= read -r row; do
            repo=$(echo "$row" | jq -r '.repository.nameWithOwner')
            number=$(echo "$row" | jq -r '.number')
            title=$(echo "$row" | jq -r '.title')

            # Only process issues created by the dep-bot.
            if [[ "$title" != "deps: dependency update report"* ]]; then
              continue
            fi

            # Fetch comments and check for SKIP or existing APPROVE.
            comments=$(gh api "repos/$repo/issues/$number/comments" --jq '[.[].body | ascii_upcase]')

            if echo "$comments" | jq -e 'any(. | contains("SKIP"))' > /dev/null; then
              echo "  SKIP   $repo#$number"
              skipped=$((skipped + 1))
              continue
            fi

            if echo "$comments" | jq -e 'any(. | contains("APPROVE"))' > /dev/null; then
              echo "  ALREADY APPROVED   $repo#$number"
              already_approved=$((already_approved + 1))
              continue
            fi

            gh issue comment "$number" --repo "$repo" --body "approve"
            echo "  APPROVED   $repo#$number"
            approved=$((approved + 1))

          done < <(echo "$issues" | jq -c '.[]')

          echo ""
          echo "Done — approved: $approved | skipped (SKIP): $skipped | already approved: $already_approved"

          # Kick off the Approval Watcher immediately so PRs are created now
          # rather than waiting up to 30 minutes for its next scheduled run.
          # Only bother if something was actually approved this run.
          if [[ $approved -gt 0 ]]; then
            echo ""
            echo "Triggering Approval Watcher to create PRs..."
            gh workflow run approve-watcher.yml \
              --repo "$GITHUB_REPOSITORY"
            echo "Watcher triggered — wait ~2-3 min for PRs to appear, then"
            echo "wait for CI to pass before running Bulk Merge."
          fi
